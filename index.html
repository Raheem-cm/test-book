<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYONI-XMD-WAR | Tanzania Homeland Defense</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; background: #4a5d23; /* Map ya msituni */ }
        
        /* UI ya Mchezo */
        #game-ui {
            position: absolute; top: 10px; left: 10px; color: #fff;
            background: rgba(0, 0, 0, 0.7); padding: 15px; border-radius: 8px;
            border: 2px solid #1e592f; pointer-events: none;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 30px; height: 30px; border: 2px solid red; border-radius: 50%; pointer-events: none;
        }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }

        .btn-deploy {
            padding: 20px 60px; font-size: 28px; background: #1e592f; color: #ffd700;
            border: 4px solid #ffd700; cursor: pointer; font-weight: bold; transition: 0.3s;
        }

        .btn-deploy:hover { background: #ffd700; color: #1e592f; }
        h1 { color: #ffd700; font-size: 50px; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

<div id="start-screen">
    <h1>NYONI-XMD-WAR</h1>
    <p style="color: white; font-size: 20px;">Protect Tanzania Border & NYONI-XMD-CAMP</p>
    <button class="btn-deploy" onclick="startGame()">DEPLOY JWTZ FORCES</button>
</div>

<div id="game-ui">
    <div style="color: #ffd700; font-weight: bold;">UNIT: NYONI SPECIAL FORCES (JWTZ)</div>
    <div>MISSION: DEFEND THE CAMP</div>
    <hr>
    <div>HEALTH: <span id="hp">100%</span></div>
    <div>AMMO: <span id="ammo">30/30</span></div>
    <div>ENEMIES KILLED: <span id="kills">0</span></div>
</div>

<div id="crosshair"></div>
<canvas id="warCanvas"></canvas>

<script>
    const canvas = document.getElementById('warCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let isRunning = false;
    let kills = 0;
    let hp = 100;
    let ammo = 30;
    
    const bullets = [];
    const enemies = [];
    const soldier = { x: canvas.width/2, y: canvas.height - 100, speed: 5, angle: 0 };

    // NYONI-XMD-CAMP Location
    const camp = { x: canvas.width/2 - 200, y: 10, w: 400, h: 120 };

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);
    const keys = {};

    window.addEventListener('mousemove', e => {
        soldier.angle = Math.atan2(e.clientY - soldier.y, e.clientX - soldier.x);
    });

    window.addEventListener('mousedown', () => {
        if (ammo > 0 && isRunning) {
            bullets.push({
                x: soldier.x, y: soldier.y,
                vx: Math.cos(soldier.angle) * 12,
                vy: Math.sin(soldier.angle) * 12
            });
            ammo--;
            updateUI();
        }
    });

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        isRunning = true;
        spawnEnemy();
        update();
    }

    function spawnEnemy() {
        if(isRunning) {
            enemies.push({ x: Math.random() * canvas.width, y: -50, speed: 2 + (kills/10) });
            setTimeout(spawnEnemy, 1500);
        }
    }

    function updateUI() {
        document.getElementById('hp').innerText = hp + "%";
        document.getElementById('ammo').innerText = ammo + "/30";
        document.getElementById('kills').innerText = kills;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Map Decoration (Tanzania Savanna/Greenery)
        ctx.fillStyle = "#3e4d21"; ctx.fillRect(0,0, canvas.width, canvas.height);

        // NYONI-XMD-CAMP Building
        ctx.fillStyle = "#333";
        ctx.fillRect(camp.x, camp.y, camp.w, camp.h);
        ctx.strokeStyle = "gold"; ctx.lineWidth = 5;
        ctx.strokeRect(camp.x, camp.y, camp.w, camp.h);
        ctx.fillStyle = "#fff"; ctx.font = "bold 24px Arial";
        ctx.fillText("NYONI-XMD-CAMP (HEADQUARTERS)", camp.x + 15, camp.y + 70);

        // Magari na Pikipiki za Jeshi (Static)
        ctx.fillStyle = "#1b3314"; ctx.fillRect(100, 400, 100, 50); // JWTZ Tank
        ctx.fillText("JWTZ TANK", 100, 470);
        
        // JWTZ Soldier (Player)
        ctx.save();
        ctx.translate(soldier.x, soldier.y);
        ctx.rotate(soldier.angle);
        ctx.fillStyle = "#2e4d23"; // Gwanda la kijani la JWTZ
        ctx.beginPath(); ctx.arc(0, 0, 20, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "black"; ctx.fillRect(15, -5, 30, 10); // Bunduki
        ctx.restore();

        // Risasi
        bullets.forEach((b, i) => {
            b.x += b.vx; b.y += b.vy;
            ctx.fillStyle = "yellow"; ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
            if(b.y < 0) bullets.splice(i, 1);
        });

        // Maadui
        enemies.forEach((en, i) => {
            en.y += en.speed;
            ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(en.x, en.y, 18, 0, Math.PI*2); ctx.fill();
            
            // Bullet hit
            bullets.forEach((b, bi) => {
                if(Math.hypot(en.x - b.x, en.y - b.y) < 25) {
                    enemies.splice(i, 1);
                    bullets.splice(bi, 1);
                    kills++;
                    updateUI();
                }
            });

            // Camp Attack
            if(en.y > camp.y + camp.h - 20 && en.x > camp.x && en.x < camp.x + camp.w) {
                alert("MISSION FAILED! NYONI-XMD-CAMP WAS CAPTURED.");
                location.reload();
            }
        });
    }

    function update() {
        if(!isRunning) return;
        if (keys['KeyW']) soldier.y -= soldier.speed;
        if (keys['KeyS']) soldier.y += soldier.speed;
        if (keys['KeyA']) soldier.x -= soldier.speed;
        if (keys['KeyD']) soldier.x += soldier.speed;
        
        draw();
        requestAnimationFrame(update);
    }
</script>

</body>
</html>
