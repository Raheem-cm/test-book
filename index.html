<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYONI-XMD-AI</title>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<style>
:root { --blue:#00d2ff; --bg:#0a0a0a; --chat:#161616; --text:#fff; }

body {
    margin:0;
    font-family:sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    flex-direction:column;
    height:100vh;
}

header {
    background:#000;
    text-align:center;
    padding:10px;
    border-bottom:2px solid var(--blue);
    box-shadow:0 0 10px var(--blue);
}
header img { height:45px; }

#chat {
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.msg {
    max-width:80%;
    padding:10px;
    border-radius:12px;
    margin:8px 0;
}
.user {
    background:var(--blue);
    color:#000;
    margin-left:auto;
}
.ai {
    background:var(--chat);
    border:1px solid #333;
}
.ai img, .user img {
    width:100%;
    border-radius:10px;
}

.input-area {
    display:flex;
    padding:10px;
    background:#111;
    gap:5px;
}

input {
    flex:1;
    padding:10px;
    border-radius:20px;
    border:none;
    background:#222;
    color:#fff;
}

button {
    border:none;
    border-radius:50%;
    width:40px;
    height:40px;
    cursor:pointer;
}

.send { background:var(--blue); }
.voice { background:#333; color:#aaa; }
.voice.on { background:#ffcc00; color:#000; }
.upload { background:#555; color:#fff; }
</style>
</head>

<body>

<header>
<img src="https://files.catbox.moe/e2xq6c.jpeg">
</header>

<div id="chat">
<div class="msg ai">
<b>Welcome Boss!</b><br>
I am NYONI-XMD-AI 🤖<br><br>
<i>Sauti imezimwa. Bonyeza 🔊 kuwasha.</i>
</div>
</div>

<div class="input-area">
<input id="q" placeholder="Type message..." onkeypress="if(event.key==='Enter')send()">

<button class="send" onclick="send()">➤</button>
<button id="voiceBtn" class="voice" onclick="toggleVoice()">🔊</button>
<button class="upload" onclick="uploadImg()">📷</button>

<input type="file" id="file" accept="image/*" style="display:none">
</div>

<script>
const chat = document.getElementById("chat");
let voiceOn = false;

// add message
function add(type,text,img=false){
    let d=document.createElement("div");
    d.className="msg "+type;

    if(img){
        d.innerHTML=`<img src="${text}">`;
    } else {
        d.innerText=text;
        if(type==="ai" && voiceOn) speak(text);
    }

    chat.appendChild(d);
    chat.scrollTop=chat.scrollHeight;
}

// voice
function toggleVoice(){
    voiceOn=!voiceOn;
    let btn=document.getElementById("voiceBtn");
    btn.classList.toggle("on");
}

function speak(txt){
    let s=new SpeechSynthesisUtterance(txt);
    s.lang="en-US";
    speechSynthesis.speak(s);
}

// upload image
function uploadImg(){
    document.getElementById("file").click();
}

document.getElementById("file").addEventListener("change", function(){
    let file=this.files[0];
    if(!file) return;

    let url=URL.createObjectURL(file);
    add("user",url,true);
});

// AI response (NO STUCK 🔥)
async function askAI(q){

    // API 1
    try{
        let r=await axios.get("https://api.popcat.xyz/chatbot",{
            params:{
                msg:q,
                owner:"Nyoni",
                botname:"NYONI-XMD"
            }
        });
        return r.data.response;
    }catch(e){}

    // API 2 fallback
    try{
        let r=await axios.get("https://api.affiliateplus.xyz/api/chatbot",{
            params:{
                message:q,
                botname:"NYONI-XMD",
                ownername:"Nyoni"
            }
        });
        return r.data.message;
    }catch(e){}

    return "⚠️ AI imepata shida kidogo, jaribu tena.";
}

// send
async function send(){
    let input=document.getElementById("q");
    let q=input.value.trim();
    if(!q) return;

    add("user",q);
    input.value="";

    // 🎨 IMAGE GENERATION
    if(q.toLowerCase().includes("draw") || q.toLowerCase().includes("picha")){
        let img=`https://image.pollinations.ai/prompt/${encodeURIComponent(q)}`;
        add("ai",img,true);
        return;
    }

    let loading = document.createElement("div");
    loading.className="msg ai";
    loading.innerText="⏳ Inafikiria...";
    chat.appendChild(loading);
    chat.scrollTop=chat.scrollHeight;

    let res=await askAI(q);

    loading.remove();
    add("ai",res);
}
</script>

</body>
    </html>
