<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYONI-XMD-AI | PS2 Games Hub</title>
    <style>
        :root {
            --primary-color: #003791; /* PS2 Blue */
            --accent-color: #e6b800;
            --bg-dark: #050505;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            text-align: center;
        }

        /* Muundo wa Picha ya Juu */
        header {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://files.catbox.moe/e2xq6c.jpeg');
            background-size: cover;
            background-position: center;
            height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 4px solid var(--accent-color);
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            color: var(--accent-color);
        }

        /* Sehemu ya Emulator */
        .game-container {
            margin: 20px auto;
            width: 90%;
            max-width: 800px;
            background: #111;
            border: 2px solid #333;
            height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .game-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Orodha ya Michezo */
        .game-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1000px;
            margin: auto;
        }

        .game-card {
            background: #222;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid #444;
        }

        .game-card:hover {
            background: var(--primary-color);
            transform: scale(1.05);
        }

        .game-card img {
            width: 100%;
            border-radius: 5px;
        }

        footer {
            padding: 20px;
            background: #111;
            margin-top: 50px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<header>
    <h1>NYONI-XMD-AI</h1>
    <p>Cheza Michezo ya PS2 Moja kwa Moja Browser!</p>
</header>

<main>
    <h2>Kicheza Michezo (Screen)</h2>
    <div class="game-container" id="player">
        <p style="color: #666;">Chagua mchezo hapo chini kuanza kucheza...</p>
    </div>

    <h2>Maktaba ya Magemu</h2>
    <div class="game-list">
        <div class="game-card" onclick="playGame('https://www.retrogames.cc/embed/41635-grand-theft-auto-san-andreas.html')">
            <p>GTA San Andreas</p>
        </div>

        <div class="game-card" onclick="playGame('https://www.retrogames.cc/embed/41551-god-of-war-ii.html')">
            <p>God of War II</p>
        </div>

        <div class="game-card" onclick="playPlayer('https://www.retrogames.cc/embed/42601-naruto-shippuden-ultimate-ninja-5.html')">
            <p>Naruto Shippuden 5</p>
        </div>

        <div class="game-card" onclick="playGame('https://www.retrogames.cc/embed/42442-pro-evolution-soccer-2013.html')">
            <p>PES 2013</p>
        </div>
        
        <div class="game-card" onclick="playGame('https://www.retrogames.cc/embed/41648-tekken-5.html')">
            <p>Tekken 5</p>
        </div>
    </div>
</main>

<footer>
    &copy; 2026 NYONI-XMD-AI - Powered by Retro Games Engine
</footer>

<script>
    function playGame(url) {
        const container = document.getElementById('player');
        container.innerHTML = `<iframe src="${url}" allowfullscreen="true" scrolling="no"></iframe>`;
        // Shusha screen mpaka kwenye game
        window.scrollTo({top: 300, behavior: 'smooth'});
    }
</script>

</body>
</html>
