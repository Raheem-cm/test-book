<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYONI-XMD-AI | Pro Advisor</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #00d2ff; --bg: #0a0a0a; --chat: #161616; --text: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #000; padding: 12px; text-align: center; border-bottom: 2px solid var(--blue); box-shadow: 0 0 15px var(--blue); }
        header img { height: 45px; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 80%; padding: 12px; border-radius: 15px; font-size: 14px; line-height: 1.4; }
        .user { align-self: flex-end; background: var(--blue); color: #000; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--chat); border: 1px solid #333; border-bottom-left-radius: 2px; }
        .ai img { max-width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid var(--blue); }
        .input-area { background: #111; padding: 15px; display: flex; gap: 8px; border-top: 1px solid #222; }
        input { flex: 1; background: #222; border: 1px solid #444; padding: 12px; color: #fff; border-radius: 25px; outline: none; }
        input:focus { border-color: var(--blue); }
        button { background: var(--blue); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; transition: 0.3s; }
        .v-btn { background: #333; color: #666; }
        .v-on { background: #ffcc00; color: #000; }
        .status { padding: 5px 20px; font-size: 12px; color: var(--blue); display: none; }
    </style>
</head>
<body>

<header><img src="https://files.catbox.moe/e2xq6c.jpeg" alt="NYONI-XMD"></header>

<div id="chat-box">
    <div class="msg ai"><b>Welcome Boss!</b> I am NYONI-XMD-AI. I can chat, draw images, and speak. <br><br><i>Sauti imezimwa (Mute). Bonyeza button ya njano kuwasha.</i></div>
</div>

<div id="loading" class="status">NYONI-XMD is processing...</div>

<div class="input-area">
    <input type="text" id="query" placeholder="Ask NYONI-XMD something..." onkeypress="if(event.key==='Enter') startChat()">
    <button onclick="startChat()"><i class="fas fa-paper-plane"></i></button>
    <button id="vBtn" class="v-btn" onclick="toggleVoice()"><i class="fas fa-volume-up"></i></button>
</div>

<script>
    let voiceActive = false;
    const chatBox = document.getElementById('chat-box');
    const loading = document.getElementById('loading');

    function toggleVoice() {
        voiceActive = !voiceActive;
        const btn = document.getElementById('vBtn');
        btn.className = voiceActive ? "v-btn v-on" : "v-btn";
        if(!voiceActive) window.speechSynthesis.cancel();
    }

    function addMsg(type, content, isImg = false) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        if(isImg) {
            div.innerHTML = `<img src="${content}">`;
        } else {
            div.innerText = content;
            if(type === 'ai' && voiceActive) speak(content);
        }
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function speak(txt) {
        const s = new SpeechSynthesisUtterance(txt);
        s.lang = 'en-US';
        window.speechSynthesis.speak(s);
    }

    async function startChat() {
        const val = document.getElementById('query').value.trim();
        if(!val) return;
        
        addMsg('user', val);
        document.getElementById('query').value = '';
        loading.style.display = 'block';

        try {
            if(val.toLowerCase().includes('draw') || val.toLowerCase().includes('picha') || val.toLowerCase().includes('nivutie')) {
                const img = `https://pollinations.ai/p/${encodeURIComponent(val)}?width=1024&height=1024&seed=42&model=flux`;
                addMsg('ai', img, true);
            } else {
                // API mbadala ya uhakika zaidi (GPT-4 / Gemini Proxy)
                const res = await axios.get(`https://api.giftedtech.my.id/api/ai/gpt4?apikey=gifted&q=${encodeURIComponent(val)}`);
                addMsg('ai', res.data.result || "I couldn't process that.");
            }
        } catch (e) {
            addMsg('ai', "⚠️ Server Busy. Please wait 5 seconds and try again.");
        } finally {
            loading.style.display = 'none';
        }
    }
</script>
</body>
</html>
