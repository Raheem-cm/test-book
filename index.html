<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYONI-XMD-AI | Advisor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #00d2ff; --bg: #0a0a0a; --chat: #1a1a1a; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #000; padding: 12px; text-align: center; border-bottom: 2px solid var(--blue); }
        header img { height: 45px; filter: drop-shadow(0 0 5px var(--blue)); }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle, #111, #000); }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .user { align-self: flex-end; background: var(--blue); color: #000; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--chat); border: 1px solid #333; border-bottom-left-radius: 2px; }
        .ai img { max-width: 100%; border-radius: 12px; margin-top: 10px; border: 1.5px solid var(--blue); }
        .input-area { background: #000; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #222; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; padding: 12px 20px; color: #fff; border-radius: 30px; outline: none; }
        button { background: var(--blue); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .v-btn { background: #222; color: #555; }
        .v-on { background: #ffcc00; color: #000; box-shadow: 0 0 10px #ffcc00; }
        .loader { padding: 5px 20px; font-size: 12px; color: var(--blue); display: none; }
    </style>
</head>
<body>

<header><img src="https://files.catbox.moe/e2xq6c.jpeg" alt="NYONI-XMD"></header>

<div id="chat-box">
    <div class="msg ai"><b>NYONI-XMD-AI is Online!</b> 🚀<br>Ninaweza kuchat, kuvuta picha, na kuongea. <br><br><i>Gusa button ya njano kuwasha sauti.</i></div>
</div>

<div id="loader" class="loader">NYONI-XMD is thinking...</div>

<div class="input-area">
    <input type="text" id="query" placeholder="Ask anything..." onkeypress="if(event.key==='Enter') startChat()">
    <button onclick="startChat()"><i class="fas fa-paper-plane"></i></button>
    <button id="vBtn" class="v-btn" onclick="toggleVoice()"><i class="fas fa-volume-up"></i></button>
</div>

<script>
    let voiceActive = false;
    const chatBox = document.getElementById('chat-box');

    function toggleVoice() {
        voiceActive = !voiceActive;
        document.getElementById('vBtn').className = voiceActive ? "v-btn v-on" : "v-btn";
        if(!voiceActive) window.speechSynthesis.cancel();
    }

    function addMsg(type, content, isImg = false) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        if(isImg) {
            div.innerHTML = `<img src="${content}">`;
        } else {
            div.innerText = content;
            if(type === 'ai' && voiceActive) speak(content);
        }
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function speak(txt) {
        const s = new SpeechSynthesisUtterance(txt);
        s.lang = 'en-US';
        window.speechSynthesis.speak(s);
    }

    async function startChat() {
        const val = document.getElementById('query').value.trim();
        if(!val) return;
        
        addMsg('user', val);
        document.getElementById('query').value = '';
        document.getElementById('loader').style.display = 'block';

        try {
            // PICHA (Always works)
            if(val.toLowerCase().includes('draw') || val.toLowerCase().includes('picha')) {
                const img = `https://image.pollinations.ai/prompt/${encodeURIComponent(val)}?nologo=true&seed=${Math.random()}`;
                addMsg('ai', img, true);
            } else {
                // CHAT (Mifumo ya DuckDuckGo AI - Imara sana)
                const res = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(val)}&format=json`);
                const data = await res.json();
                
                let reply = data.AbstractText || "I am NYONI-XMD-AI. I am here to assist you. What can I do for you today?";
                
                // Kama DuckDuckGo haina jibu la moja kwa moja, tunatumia backup ya haraka
                if(reply.length < 5) {
                    reply = `I am NYONI-XMD-AI. Currently, I am processing your request about "${val}". How can I specifically help you as an advisor?`;
                }
                
                addMsg('ai', reply);
            }
        } catch (e) {
            addMsg('ai', "⚠️ Connection refreshed. Try again.");
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }
</script>
</body>
</html>
