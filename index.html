<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYONI-XMD-AI | PRO CONSOLE</title>
    <style>
        :root {
            --ps-blue: #0072ff;
            --ps-dark: #020205;
            --neon-glow: #00d4ff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--ps-dark);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow-x: hidden;
            background-image: radial-gradient(circle at center, #0a0a2e 0%, #020205 100%);
        }

        /* High-End Header */
        header {
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            background: rgba(0,0,0,0.8);
            border-bottom: 2px solid var(--ps-blue);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--ps-blue);
        }

        .user-status {
            color: var(--neon-glow);
            font-size: 0.9rem;
            text-transform: uppercase;
            border: 1px solid var(--neon-glow);
            padding: 5px 15px;
            border-radius: 20px;
        }

        /* Hero Section with your Image */
        .hero {
            position: relative;
            width: 95%;
            height: 250px;
            margin: 20px auto;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            background: url('https://files.catbox.moe/e2xq6c.jpeg') center/cover;
        }

        .hero-overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 40px;
            background: linear-gradient(to top, rgba(0,0,0,1), transparent);
        }

        /* PSP/PS5 Styled Horizontal List */
        .game-section {
            padding: 20px 40px;
        }

        .section-title {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: #ccc;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .game-scroller {
            display: flex;
            gap: 25px;
            overflow-x: auto;
            padding-bottom: 30px;
            scrollbar-width: none;
        }

        .game-card {
            min-width: 200px;
            height: 280px;
            background: var(--glass);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.4s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 15px;
            backdrop-filter: blur(10px);
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: var(--ps-blue);
            box-shadow: 0 0 25px rgba(0, 114, 255, 0.4);
        }

        .game-card .category {
            font-size: 0.7rem;
            color: var(--neon-glow);
            font-weight: bold;
            margin-bottom: 5px;
        }

        .game-card h3 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Professional Fullscreen Player */
        #main-stage {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 1000;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .close-system {
            position: absolute;
            top: 20px;
            right: 40px;
            background: red;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1100;
            box-shadow: 0 0 15px rgba(255,0,0,0.5);
        }

        /* Business WhatsApp Button */
        .buy-now {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #25d366;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 99;
        }
    </style>
</head>
<body>

<header>
    <div class="brand">NYONI-XMD-AI <span style="color:var(--ps-blue)">PRO</span></div>
    <div class="user-status">System: Online</div>
</header>

<div class="hero">
    <div class="hero-overlay">
        <h2>Next-Gen Cloud Gaming</h2>
        <p>Premium Access to PSP, PS4 & PS5 Library</p>
    </div>
</div>

<div class="game-section">
    <div class="section-title">Ultimate Classics (PSP/PS4)</div>
    <div class="game-scroller">
        
        <div class="game-card" onclick="openSystem('https://www.retrogames.cc/embed/42601-naruto-shippuden-ultimate-ninja-5.html')">
            <div class="category">PSP CLASSIC</div>
            <h3>Naruto Shippuden</h3>
        </div>

        <div class="game-card" onclick="openSystem('https://www.retrogames.cc/embed/41551-god-of-war-ii.html')">
            <div class="category">PS4 REMASTER</div>
            <h3>God of War II</h3>
        </div>

        <div class="game-card" onclick="openSystem('https://www.retrogames.cc/embed/41635-grand-theft-auto-san-andreas.html')">
            <div class="category">PS4 EDITION</div>
            <h3>GTA: San Andreas</h3>
        </div>

        <div class="game-card" onclick="openSystem('https://www.retrogames.cc/embed/41724-mortal-kombat-armageddon.html')">
            <div class="category">PS5 KOMBAT</div>
            <h3>Mortal Kombat</h3>
        </div>

        <div class="game-card" onclick="openSystem('https://www.retrogames.cc/embed/41648-tekken-5.html')">
            <div class="category">PS4 LEGACY</div>
            <h3>Tekken 5</h3>
        </div>

    </div>
</div>

<div id="main-stage">
    <button class="close-system" onclick="closeSystem()">CLOSE CONSOLE [X]</button>
    <div id="engine-container" style="width: 100%; height: 100%;"></div>
</div>

<a href="https://wa.me/255763111390?text=I%20want%20to%20buy%20premium%20access" class="buy-now">
    BUY PREMIUM ACCESS
</a>

<script>
    function openSystem(url) {
        const stage = document.getElementById('main-stage');
        const container = document.getElementById('engine-container');
        
        // Show Booting Animation
        container.innerHTML = '<div style="display:flex; height:100%; justify-content:center; align-items:center;"><h2>LINKING TO CLOUD SERVER...</h2></div>';
        stage.style.display = 'block';
        
        setTimeout(() => {
            container.innerHTML = `<iframe src="${url}" allowfullscreen="true" scrolling="no"></iframe>`;
        }, 1500);
    }

    function closeSystem() {
        document.getElementById('main-stage').style.display = 'none';
        document.getElementById('engine-container').innerHTML = '';
    }
</script>

</body>
</html>
