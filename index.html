<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYONI-XMD-AI | Professional Advisor</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #00d2ff;
            --dark-bg: #121212;
            --chat-bg: #1e1e1e;
            --text-color: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header Area */
        header {
            background: #000;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--primary-blue);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }

        header img {
            height: 60px;
            filter: drop-shadow(0 0 5px var(--primary-blue));
        }

        /* Chat Window */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 15px;
            line-height: 1.5;
            font-size: 15px;
            position: relative;
        }

        .user-message {
            align-self: flex-end;
            background: var(--primary-blue);
            color: #000;
            border-bottom-right-radius: 2px;
        }

        .ai-message {
            align-self: flex-start;
            background: var(--chat-bg);
            color: var(--text-color);
            border-bottom-left-radius: 2px;
            border: 1px solid #333;
        }

        /* Input Area */
        .input-area {
            background: #181818;
            padding: 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
        }

        input {
            flex: 1;
            background: #252525;
            border: 1px solid #444;
            padding: 12px;
            color: white;
            border-radius: 25px;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-blue);
        }

        button {
            background: var(--primary-blue);
            border: none;
            color: black;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 10px var(--primary-blue);
        }

        /* Loading Animation */
        .typing {
            font-style: italic;
            font-size: 12px;
            color: var(--primary-blue);
            display: none;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<header>
    <img src="https://files.catbox.moe/e2xq6c.jpeg" alt="NYONI-XMD-AI LOGO">
</header>

<div id="chat-window">
    <div class="message ai-message">
        Hello! I am <b>NYONI-XMD-AI</b>, your professional advisor. How can I help you today?<br>
        <i>(Habari! Mimi ni NYONI-XMD-AI, mshauri wako. Naweza kukusaidia nini leo?)</i>
    </div>
</div>

<div style="padding-left: 20px;" id="status-text" class="typing">NYONI-XMD is thinking...</div>

<div class="input-area">
    <input type="text" id="user-input" placeholder="Type your message here (Lugha yoyote)..." onkeypress="handleEnter(event)">
    <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const userInput = document.getElementById('user-input');
    const statusText = document.getElementById('status-text');

    function appendMessage(role, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}-message`;
        msgDiv.innerHTML = text;
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // User Message
        appendMessage('user', text);
        userInput.value = '';
        statusText.style.display = 'block';

        try {
            // Hapa AI inatumia API ya Bure ya GPT-4 kukujibu
            const response = await axios.get(`https://api.giftedtech.my.id/api/ai/gpt4?apikey=gifted&q=${encodeURIComponent(text)}`);
            const aiReply = response.data.result;
            
            statusText.style.display = 'none';
            appendMessage('ai', aiReply);
        } catch (error) {
            statusText.style.display = 'none';
            appendMessage('ai', "Sorry, NYONI-XMD encountered an error. Please try again.");
        }
    }

    function handleEnter(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }
</script>

</body>
</html>
