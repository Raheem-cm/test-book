<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYONI-XMD-AI | PRO CONSOLE V2</title>
    <style>
        :root {
            --ps-blue: #0072ff;
            --ps-dark: #020205;
            --accent: #00d4ff;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--ps-dark);
            font-family: 'Segoe UI', sans-serif;
            color: white; overflow-x: hidden;
        }

        header {
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            background: rgba(0,0,0,0.9);
            border-bottom: 2px solid var(--ps-blue);
        }

        .container {
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .game-card:hover {
            transform: scale(1.05);
            border-color: var(--ps-blue);
            background: rgba(0, 114, 255, 0.2);
        }

        /* The Fullscreen Fix */
        #game-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000;
            z-index: 9999;
        }

        #game-frame {
            width: 100%; height: 100%;
            border: none;
        }

        .controls {
            position: absolute;
            top: 10px; right: 20px;
            z-index: 10000;
        }

        .btn-exit {
            background: red;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255,0,0,0.5);
        }

        .loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: var(--ps-blue);
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <div style="font-weight:900; letter-spacing:2px;">NYONI-XMD-AI <span style="color:var(--ps-blue)">PRO</span></div>
</header>

<div class="container">
    <div class="game-card" onclick="launch('https://www.retrogames.cc/embed/42601-naruto-shippuden-ultimate-ninja-5.html')">
        <h3>Naruto 5</h3>
    </div>
    <div class="game-card" onclick="launch('https://www.retrogames.cc/embed/41635-grand-theft-auto-san-andreas.html')">
        <h3>GTA SA</h3>
    </div>
    <div class="game-card" onclick="launch('https://www.retrogames.cc/embed/41551-god-of-war-ii.html')">
        <h3>God of War II</h3>
    </div>
    <div class="game-card" onclick="launch('https://www.retrogames.cc/embed/41724-mortal-kombat-armageddon.html')">
        <h3>Mortal Kombat</h3>
    </div>
</div>

<div id="game-overlay">
    <div class="controls">
        <button class="btn-exit" onclick="closeGame()">EXIT GAME [X]</button>
    </div>
    <div id="loader" class="loader">CONNECTING TO CLOUD SERVER...</div>
    <iframe id="game-frame" src="" allowfullscreen="true"></iframe>
</div>

<script>
    function launch(url) {
        const overlay = document.getElementById('game-overlay');
        const frame = document.getElementById('game-frame');
        const loader = document.getElementById('loader');

        overlay.style.display = 'block';
        loader.style.display = 'block';
        
        // This helps force the load
        frame.src = url;

        frame.onload = function() {
            loader.style.display = 'none';
        };
    }

    function closeGame() {
        const overlay = document.getElementById('game-overlay');
        const frame = document.getElementById('game-frame');
        overlay.style.display = 'none';
        frame.src = ""; // Stop the game completely
    }
</script>

</body>
</html>
