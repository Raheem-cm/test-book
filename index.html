<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYONI-XMD-AI | PS2 Free Games Hub</title>
    <style>
        :root {
            --primary-blue: #003791; /* Classic PS2 Blue */
            --accent-gold: #ffcc00; /* Bright Gold */
            --neon-purple: #8a2be2; /* Neon Purple Accent */
            --bg-intense: url('https://files.catbox.moe/kixq1b.jpg'); /* Intense Gaming Background */
        }

        body {
            background-color: #000;
            background-image: var(--bg-intense);
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: white;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* Header (Styled Banner) */
        header {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), 
                        url('https://files.catbox.moe/e2xq6c.jpeg');
            background-size: cover;
            background-position: top;
            height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 3px solid var(--accent-gold);
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 3.5rem;
            margin: 0;
            text-shadow: 0 0 15px var(--accent-gold), 0 0 30px var(--neon-purple);
            color: #fff;
            letter-spacing: 2px;
        }

        header p {
            margin: 5px 0 0;
            font-size: 1.2rem;
            color: #ddd;
        }

        /* Game Player Section (FullScreen Layout) */
        #game-section {
            display: none; /* Hidden by default until a game is selected */
            width: 100vw;
            height: 95vh; /* Almost full viewport height */
            background: #000;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .game-iframe-container {
            width: 100%;
            height: 100%;
            border: none;
            overflow: hidden;
            position: relative;
        }

        .game-iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 20px;
            background-color: var(--accent-gold);
            color: #000;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            z-index: 1001;
        }

        /* Game List Section */
        .container {
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }

        h2 {
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .game-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        .game-card {
            background: rgba(17, 17, 17, 0.8); /* Semi-transparent background */
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.4s ease;
            border: 2px solid #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .game-card:hover {
            background: rgba(0, 55, 145, 0.9); /* PS2 Blue Hover */
            transform: scale(1.08) translateY(-5px);
            border-color: var(--accent-gold);
            box-shadow: 0 0 20px var(--accent-gold);
        }

        .game-card p {
            margin: 10px 0 0;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 3px black;
        }

        footer {
            padding: 30px;
            background: rgba(0,0,0,0.9);
            margin-top: 50px;
            font-size: 0.9rem;
            border-top: 2px solid #333;
        }
    </style>
</head>
<body>

<header>
    <h1>NYONI-XMD-AI</h1>
    <p>Premium PS2 Free Games Hub</p>
</header>

<div class="container">
    <h2>Available Game Titles</h2>
    
    <div class="game-list">
        <div class="game-card" onclick="playGame('https://www.retrogames.cc/embed/41635-grand-theft-auto-san-andreas.html')">
            <p>GTA San Andreas</p>
        </div>

        <div class="game-card" onclick="playGame('https://www.retrogames.cc/embed/41551-god-of-war-ii.html')">
            <p>God of War II</p>
        </div>

        <div class="game-card" onclick="playGame('https://www.retrogames.cc/embed/42601-naruto-shippuden-ultimate-ninja-5.html')">
            <p>Naruto Shippuden 5</p>
        </div>

        <div class="game-card" onclick="playGame('https://www.retrogames.cc/embed/42442-pro-evolution-soccer-2013.html')">
            <p>PES 2013</p>
        </div>
        
        <div class="game-card" onclick="playGame('https://www.retrogames.cc/embed/41648-tekken-5.html')">
            <p>Tekken 5</p>
        </div>

        <div class="game-card" onclick="playGame('https://www.retrogames.cc/embed/41724-mortal-kombat-armageddon.html')">
            <p>Mortal Kombat: Armageddon</p>
        </div>
    </div>
</div>

<div id="game-section">
    <button class="close-btn" onclick="closeGame()">Close Game [X]</button>
    <div class="game-iframe-container" id="player-container">
        </div>
</div>

<footer>
    &copy; 2024 NYONI-XMD-AI - All Rights Reserved | Non-profit emulation platform.
</footer>

<script>
    function playGame(url) {
        const gameSection = document.getElementById('game-section');
        const container = document.getElementById('player-container');
        
        // Inject the iframe
        container.innerHTML = `<iframe src="${url}" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true" scrolling="no"></iframe>`;
        
        // Show the fullscreen player
        gameSection.style.display = 'block';
        
        // Add a class to body to prevent scrolling background while playing
        document.body.style.overflow = 'hidden';
    }

    function closeGame() {
        const gameSection = document.getElementById('game-section');
        const container = document.getElementById('player-container');
        
        // Hide the player
        gameSection.style.display = 'none';
        
        // Destroy the iframe (stops the music/game)
        container.innerHTML = '';
        
        // Re-enable body scrolling
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
