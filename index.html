<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NYONI-XMD-AI | Pro Advisor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #00d2ff; --bg: #0a0a0a; --chat: #161616; --text: #ffffff; }
        
        body, html { 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
        }

        header { 
            background: #000; 
            padding: 10px; 
            text-align: center; 
            border-bottom: 2px solid var(--blue); 
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }
        header img { height: 40px; }

        #chat-box { 
            padding: 70px 15px 100px 15px; /* Nafasi ya juu na chini */
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            min-height: 100vh;
            box-sizing: border-box;
        }

        .msg { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 18px; 
            font-size: 14px; 
            line-height: 1.5;
            word-wrap: break-word;
        }
        .user { align-self: flex-end; background: var(--blue); color: #000; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--chat); border: 1px solid #333; border-bottom-left-radius: 2px; }
        .ai img { max-width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid var(--blue); }

        .input-container {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #000;
            padding: 15px 10px;
            border-top: 1px solid #222;
            box-sizing: border-box;
            z-index: 1000;
        }

        .input-area {
            display: flex;
            gap: 8px;
            align-items: center;
            max-width: 600px;
            margin: 0 auto;
        }

        input { 
            flex: 1; 
            background: #1a1a1a; 
            border: 1px solid #333; 
            padding: 12px 15px; 
            color: #fff; 
            border-radius: 25px; 
            outline: none;
            font-size: 14px;
        }

        button { 
            background: var(--blue); 
            border: none; 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: black;
            font-size: 18px;
            flex-shrink: 0;
        }
        .v-btn { background: #222; color: #555; }
        .v-on { background: #ffcc00; color: #000; }
        
        .loader { 
            position: fixed; 
            bottom: 85px; 
            left: 20px; 
            font-size: 12px; 
            color: var(--blue); 
            display: none; 
        }
    </style>
</head>
<body>

<header><img src="https://files.catbox.moe/e2xq6c.jpeg" alt="NYONI-XMD"></header>

<div id="chat-box">
    <div class="msg ai"><b>NYONI-XMD-AI Connected!</b> 🚀<br>Ninaweza kuchat na kuvuta picha. <br><br>Sehemu ya kuandika iko hapo chini kabisa.</div>
</div>

<div id="loader" class="loader">NYONI-XMD-AI is thinking...</div>

<div class="input-container">
    <div class="input-area">
        <input type="text" id="query" placeholder="Ask anything..." onkeypress="if(event.key==='Enter') startChat()">
        <button onclick="startChat()"><i class="fas fa-paper-plane"></i></button>
        <button id="vBtn" class="v-btn" onclick="toggleVoice()"><i class="fas fa-volume-up"></i></button>
    </div>
</div>

<script>
    let voiceActive = false;
    const chatBox = document.getElementById('chat-box');

    function toggleVoice() {
        voiceActive = !voiceActive;
        document.getElementById('vBtn').className = voiceActive ? "v-btn v-on" : "v-btn";
        if(!voiceActive) window.speechSynthesis.cancel();
    }

    function addMsg(type, content, isImg = false) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        if(isImg) {
            div.innerHTML = `<img src="${content}">`;
        } else {
            div.innerText = content;
            if(type === 'ai' && voiceActive) speak(content);
        }
        chatBox.appendChild(div);
        window.scrollTo(0, document.body.scrollHeight);
    }

    function speak(txt) {
        const s = new SpeechSynthesisUtterance(txt);
        s.lang = 'en-US';
        window.speechSynthesis.speak(s);
    }

    async function startChat() {
        const val = document.getElementById('query').value.trim();
        if(!val) return;
        
        addMsg('user', val);
        document.getElementById('query').value = '';
        document.getElementById('loader').style.display = 'block';

        try {
            if(val.toLowerCase().includes('draw') || val.toLowerCase().includes('picha')) {
                const img = `https://image.pollinations.ai/prompt/${encodeURIComponent(val)}?nologo=true&seed=${Math.random()}`;
                addMsg('ai', img, true);
            } else {
                // DuckDuckGo Proxy - Fast & No CORS
                const res = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(val)}&format=json`);
                const data = await res.json();
                let reply = data.AbstractText || "I am NYONI-XMD-AI. How can I assist you today?";
                addMsg('ai', reply);
            }
        } catch (e) {
            addMsg('ai', "I am here. Please try asking again.");
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }
</script>
</body>
</html>
