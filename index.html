<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYONI-XMD-WAR</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: url('https://files.catbox.moe/j7z9sv.jpeg') no-repeat center center;
    background-size: cover;
  }
  canvas {
    display: block;
    margin: 0 auto;
    background: rgba(0,0,0,0.2);
  }
</style>
</head>
<body>
<audio id="tanzaniaAnthem" src="https://upload.wikimedia.org/wikipedia/commons/2/27/Tanzania_national_anthem.ogg" autoplay loop></audio>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Player setup
const player = {
  x: canvas.width/2,
  y: canvas.height - 150,
  width: 50,
  height: 50,
  color: 'green',
  health: 100,
  speed: 5,
  bullets: []
};

// Enemy setup
let enemies = [];
let level = 1;
let score = 0;

function createEnemy() {
  const enemy = {
    x: Math.random() * (canvas.width - 50),
    y: -50,
    width: 50,
    height: 50,
    color: 'red',
    health: 50
  };
  enemies.push(enemy);
}

// Controls
const keys = {};
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

// Shoot bullet
function shoot() {
  player.bullets.push({x: player.x + player.width/2 - 5, y: player.y, width: 10, height: 20, color:'yellow', speed:10});
}

// Game loop
function update() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Player movement
  if(keys['ArrowLeft'] && player.x > 0) player.x -= player.speed;
  if(keys['ArrowRight'] && player.x + player.width < canvas.width) player.x += player.speed;
  if(keys['ArrowUp'] && player.y > 0) player.y -= player.speed;
  if(keys['ArrowDown'] && player.y + player.height < canvas.height) player.y += player.speed;
  if(keys[' ']) shoot();

  // Draw player
  ctx.fillStyle = player.color;
  ctx.fillRect(player.x, player.y, player.width, player.height);

  // Update bullets
  player.bullets.forEach((b, i) => {
    b.y -= b.speed;
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x, b.y, b.width, b.height);

    // Collision with enemies
    enemies.forEach((enemy, j) => {
      if(b.x < enemy.x + enemy.width &&
         b.x + b.width > enemy.x &&
         b.y < enemy.y + enemy.height &&
         b.y + b.height > enemy.y) {
           enemy.health -= 25;
           player.bullets.splice(i,1);
           if(enemy.health <= 0){
             enemies.splice(j,1);
             score += 10;
           }
      }
    });
  });

  // Update enemies
  enemies.forEach((enemy, i) => {
    enemy.y += 2 + level * 0.5;
    ctx.fillStyle = enemy.color;
    ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);

    // Enemy hits player
    if(enemy.x < player.x + player.width &&
       enemy.x + enemy.width > player.x &&
       enemy.y < player.y + player.height &&
       enemy.y + enemy.height > player.y) {
         // Reset game
         alert('NYONI-XMD amepoteza! Restarting...');
         enemies = [];
         player.health = 100;
         level = 1;
         score = 0;
    }

    // Remove if offscreen
    if(enemy.y > canvas.height) enemies.splice(i,1);
  });

  // Draw UI
  ctx.fillStyle = 'white';
  ctx.font = '20px Arial';
  ctx.fillText('Level: ' + level, 20, 30);
  ctx.fillText('Score: ' + score, 20, 60);

  requestAnimationFrame(update);
}

// Spawn enemies every few seconds
setInterval(() => {
  for(let i=0; i<level; i++) createEnemy();
  level++;
}, 5000);

update();
</script>
</body>
</html>
