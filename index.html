<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYONI-XMD-AI | Pro Gaming Station</title>
    <style>
        :root {
            --ps-blue: #003791;
            --ps-glow: #0072ff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            overflow: hidden; /* Lock scroll for console feel */
        }

        /* High-End Dynamic Background */
        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.4) contrast(1.2);
        }

        /* Top Navigation Bar */
        nav {
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 50px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 10;
        }

        .logo {
            font-weight: bold;
            font-size: 24px;
            letter-spacing: 3px;
            color: #fff;
            text-transform: uppercase;
        }

        /* Main Game Deck */
        .main-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 80px;
        }

        .category-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-left: 4px solid var(--ps-glow);
            padding-left: 15px;
        }

        .game-grid {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 20px 0;
            scrollbar-width: none; /* Hide scrollbar */
        }

        .game-card {
            min-width: 280px;
            height: 160px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .game-card:hover {
            transform: scale(1.1);
            border-color: var(--ps-glow);
            box-shadow: 0 0 30px rgba(0, 114, 255, 0.5);
            background: rgba(255,255,255,0.2);
        }

        .game-card h3 {
            margin: 0;
            font-size: 1.2rem;
            z-index: 2;
        }

        .game-card span {
            font-size: 0.8rem;
            color: var(--ps-glow);
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Full Screen Overlay */
        #console-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 9999;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .exit-btn {
            position: absolute;
            top: 20px;
            right: 40px;
            background: rgba(255, 0, 0, 0.7);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            z-index: 10000;
            transition: 0.3s;
        }

        .exit-btn:hover { background: red; }

        /* Custom Header using your provided image */
        .hero-banner {
            position: absolute;
            top: 60px;
            right: 50px;
            width: 400px;
            height: 200px;
            background: url('https://files.catbox.moe/e2xq6c.jpeg') center/cover;
            border-radius: 20px;
            border: 2px solid var(--ps-glow);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="bg-video" style="background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);"></div>

    <nav>
        <div class="logo">NYONI-XMD-AI <span style="color:var(--ps-glow)">PRO</span></div>
    </nav>

    <div class="hero-banner"></div>

    <div class="main-container">
        <div class="category-title">PlayStation Collection</div>
        
        <div class="game-grid">
            <div class="game-card" onclick="launchGame('https://www.retrogames.cc/embed/41635-grand-theft-auto-san-andreas.html')">
                <span>PS4 Edition</span>
                <h3>GTA: San Andreas</h3>
            </div>

            <div class="game-card" onclick="launchGame('https://www.retrogames.cc/embed/41551-god-of-war-ii.html')">
                <span>PS3 Remaster</span>
                <h3>God of War II</h3>
            </div>

            <div class="game-card" onclick="launchGame('https://www.retrogames.cc/embed/41648-tekken-5.html')">
                <span>Classic PS3</span>
                <h3>Tekken 5: Dark Resurrection</h3>
            </div>

            <div class="game-card" onclick="launchGame('https://www.retrogames.cc/embed/42442-pro-evolution-soccer-2013.html')">
                <span>Pro Evolution</span>
                <h3>PES 2013 HD</h3>
            </div>

            <div class="game-card" onclick="launchGame('https://www.retrogames.cc/embed/41724-mortal-kombat-armageddon.html')">
                <span>Kombat Pro</span>
                <h3>Mortal Kombat: Armageddon</h3>
            </div>
        </div>

        <p style="color: #555; font-size: 0.9rem;">Select a title with your mouse or touch to boot system...</p>
    </div>

    <div id="console-screen">
        <button class="exit-btn" onclick="closeConsole()">CLOSE SYSTEM [X]</button>
        <div id="player-engine" style="width:100%; height:100%;"></div>
    </div>

    <script>
        function launchGame(url) {
            const screen = document.getElementById('console-screen');
            const engine = document.getElementById('player-engine');
            
            // Pro loading effect
            engine.innerHTML = '<h2 style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);">BOOTING SYSTEM...</h2>';
            
            setTimeout(() => {
                engine.innerHTML = `<iframe src="${url}" allowfullscreen="true"></iframe>`;
            }, 1000);

            screen.style.display = 'block';
        }

        function closeConsole() {
            document.getElementById('console-screen').style.display = 'none';
            document.getElementById('player-engine').innerHTML = '';
        }
    </script>
</body>
</html>
