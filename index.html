<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        h2 { color: #333; margin-bottom: 20px; }
        input[type="text"] {
            width: 90%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }
        input[type="text"]:focus { border-color: #007bff; }
        button {
            margin-top: 15px;
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
        button:hover { background-color: #0056b3; }
        .result-area {
            margin-top: 25px;
            min-height: 200px;
            border: 2px dashed #ccc;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #outputImage {
            max-width: 100%;
            display: none;
        }
        .loader {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h2>Picha AI Generator</h2>
    <p>Andika unachotaka kuona hapa chini:</p>
    <input type="text" id="promptInput" placeholder="Mfano: Paka aliyevaa kofia ya kishua...">
    <br>
    <button onclick="generateImage()">Tengeneza Picha</button>

    <div class="result-area" id="resultArea">
        <div class="loader" id="loader"></div>
        <img src="" alt="Picha yako itatokea hapa" id="outputImage">
        <p id="placeholderText">Picha yako itaonekana hapa</p>
    </div>
</div>

<script>
    async function generateImage() {
        const prompt = document.getElementById('promptInput').value;
        const imgElement = document.getElementById('outputImage');
        const loader = document.getElementById('loader');
        const placeholder = document.getElementById('placeholderText');

        if (!prompt) {
            alert("Tafadhali andika maelezo kwanza!");
            return;
        }

        // Onyesha loading
        loader.style.display = 'block';
        imgElement.style.display = 'none';
        placeholder.style.display = 'none';

        try {
            /* Kumbuka: Hapa ndipo unapoweka API ya huduma kama OpenAI (DALL-E) 
               au HuggingFace. Kwa sasa, nitatumia picha ya mfano (Unsplash) 
               kuonyesha jinsi itakavyofanya kazi.
            */
            
            // Hii ni sehemu ya mfano tu (Simulated API call)
            setTimeout(() => {
                const randomId = Math.floor(Math.random() * 1000);
                imgElement.src = `https://picsum.photos/seed/${randomId}/400/400`;
                
                imgElement.onload = () => {
                    loader.style.display = 'none';
                    imgElement.style.display = 'block';
                };
            }, 2000);

        } catch (error) {
            alert("Kuna tatizo limetokea!");
            loader.style.display = 'none';
            placeholder.style.display = 'block';
        }
    }
</script>

</body>
</html>
