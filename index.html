<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NYONI-XMD-WAR</title>
<style>
body { margin: 0; overflow: hidden; background: black; }
#info {
  position: absolute;
  top: 10px;
  left: 10px;
  color: lime;
  font-family: monospace;
}
</style>
</head>
<body>

<div id="info">NYONI-XMD-WAR | Protect Tanzania 🇹🇿</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x222222);

// Camera
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

// Renderer
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,7);
scene.add(light);

// Ground (Tanzania battlefield)
const groundGeo = new THREE.PlaneGeometry(200,200);
const groundMat = new THREE.MeshStandardMaterial({color: 0x556b2f});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// Player gun
const gunGeo = new THREE.BoxGeometry(0.2,0.2,1);
const gunMat = new THREE.MeshStandardMaterial({color: 0x333333});
const gun = new THREE.Mesh(gunGeo, gunMat);
gun.position.set(0,-0.3,-1);
camera.add(gun);
scene.add(camera);

// Enemy
const enemyGeo = new THREE.BoxGeometry(1,2,1);
const enemyMat = new THREE.MeshStandardMaterial({color: "red"});
const enemy = new THREE.Mesh(enemyGeo, enemyMat);
enemy.position.set(0,1,-10);
scene.add(enemy);

// Simple building (NYONI-XMD CAMP)
const campGeo = new THREE.BoxGeometry(5,3,5);
const campMat = new THREE.MeshStandardMaterial({color: 0x4444ff});
const camp = new THREE.Mesh(campGeo, campMat);
camp.position.set(10,1.5,-20);
scene.add(camp);

// Movement
let moveForward = false;
let moveBackward = false;
let moveLeft = false;
let moveRight = false;

document.addEventListener("keydown", (e)=>{
  if(e.key=="w") moveForward=true;
  if(e.key=="s") moveBackward=true;
  if(e.key=="a") moveLeft=true;
  if(e.key=="d") moveRight=true;
});

document.addEventListener("keyup", (e)=>{
  if(e.key=="w") moveForward=false;
  if(e.key=="s") moveBackward=false;
  if(e.key=="a") moveLeft=false;
  if(e.key=="d") moveRight=false;
});

// Shooting
document.addEventListener("click", ()=>{
  if(camera.position.distanceTo(enemy.position) < 5){
    alert("Enemy eliminated!");
    enemy.position.set(Math.random()*20-10,1,-20);
  }
});

// Camera start
camera.position.y = 1.6;

// Animation loop
function animate(){
  requestAnimationFrame(animate);

  if(moveForward) camera.position.z -= 0.1;
  if(moveBackward) camera.position.z += 0.1;
  if(moveLeft) camera.position.x -= 0.1;
  if(moveRight) camera.position.x += 0.1;

  renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
