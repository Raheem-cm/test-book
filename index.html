<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>NYONI-XMD-WAR | 3D World War Heroes</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Oswald', sans-serif; }
        #ui-layer {
            position: absolute;
            top: 20px; left: 20px;
            color: #fcd116; /* TZ Yellow */
            text-shadow: 2px 2px #000;
            z-index: 10;
            pointer-events: none;
        }
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 20px; height: 20px;
            border: 2px solid rgba(0, 255, 0, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
        }
        #blood-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 50%, rgba(255,0,0,0.5) 100%);
            display: none;
            pointer-events: none;
            z-index: 6;
        }
        .msg-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: white; z-index: 100; display: none;
        }
        .btn {
            background: #008751; color: white; border: 2px solid #fcd116;
            padding: 15px 40px; font-size: 1.5rem; cursor: pointer; margin-top: 20px;
        }
        #weapon-hand {
            position: absolute;
            bottom: -20px; right: 10%;
            width: 400px;
            z-index: 8;
            pointer-events: none;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="ui-layer">
        <h2 style="margin:0;">KAMANDA: NYONI-XMD</h2>
        <div>HEALTH: <span id="hp">100</span>%</div>
        <div>LEVEL: <span id="lvl">1</span></div>
        <div>KILLS: <span id="kills">0</span></div>
    </div>

    <div id="crosshair"></div>
    <div id="blood-overlay"></div>

    <img id="weapon-hand" src="https://files.catbox.moe/w7k2d1.png" alt="Gun">

    <div id="start-screen" class="screen-overlay" style="display: flex; position: absolute; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:200; flex-direction:column; justify-content:center; align-items:center; color:white;">
        <img src="https://files.catbox.moe/j7z9sv.jpeg" style="width:150px; border-radius:50%; border:5px solid #008751;">
        <h1 style="font-size: 3.5rem; color:#fcd116;">NYONI-XMD-WAR</h1>
        <p>BONYEZA KITUFE KUANZA MISSION TANZANIA</p>
        <button class="btn" onclick="initGame()">DEPLOY COMMANDER</button>
        <p style="font-size: 0.8rem; margin-top:10px;">WASD: Move | Mouse: Aim | Click: Fire</p>
    </div>

    <div id="fail-screen" class="msg-screen">
        <h1 style="color:red; font-size:4rem;">MISSION FAILED</h1>
        <p>Kamanda NYONI-XMD ameuawa vitani!</p>
        <button class="btn" onclick="location.reload()">RE-DEPLOY</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, playerHP = 100, kills = 0, level = 1;
        let enemies = [], bullets = [];
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let isRunning = false;

        function initGame() {
            document.getElementById('start-screen').style.display = 'none';
            isRunning = true;
            setup3D();
            animate();
            spawnEnemies();
            
            // Lock Mouse for FPS feel
            document.body.requestPointerLock = document.body.requestPointerLock || document.body.mozRequestPointerLock;
            document.body.requestPointerLock();
        }

        function setup3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // Sky Blue
            scene.fog = new THREE.Fog(0x87ceeb, 10, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Ground (Tanzania Soil/Grass)
            const groundGeo = new THREE.PlaneGeometry(200, 200);
            const groundMat = new THREE.MeshPhongMaterial({ color: 0x228B22 }); // Forest Green
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 7.5);
            scene.add(new THREE.AmbientLight(0x404040));
            scene.add(light);

            camera.position.y = 1.6; // Human height
        }

        function spawnEnemies() {
            for(let i=0; i < 5 + level; i++) {
                const geo = new THREE.BoxGeometry(0.8, 1.8, 0.8);
                const mat = new THREE.MeshPhongMaterial({ color: 0x442200 }); // Enemy color
                const enemy = new THREE.Mesh(geo, mat);
                enemy.position.set(Math.random()*40-20, 0.9, Math.random()*40-20);
                scene.add(enemy);
                enemies.push(enemy);
            }
        }

        // Controls
        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveForward = true;
            if(e.code === 'KeyS') moveBackward = true;
            if(e.code === 'KeyA') moveLeft = true;
            if(e.code === 'KeyD') moveRight = true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveForward = false;
            if(e.code === 'KeyS') moveBackward = false;
            if(e.code === 'KeyA') moveLeft = false;
            if(e.code === 'KeyD') moveRight = false;
        });

        document.addEventListener('mousemove', (e) => {
            if(!isRunning) return;
            camera.rotation.y -= e.movementX * 0.002;
        });

        document.addEventListener('mousedown', () => {
            if(!isRunning) return;
            fire();
        });

        function fire() {
            // Animating gun kickback
            const gun = document.getElementById('weapon-hand');
            gun.style.transform = 'translateY(-20px) scale(1.1)';
            setTimeout(() => gun.style.transform = 'translateY(0) scale(1)', 50);

            // Raycasting for 3D shooting
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const intersects = raycaster.intersectObjects(enemies);

            if (intersects.length > 0) {
                const hitEnemy = intersects[0].object;
                scene.remove(hitEnemy);
                enemies = enemies.filter(e => e !== hitEnemy);
                kills++;
                document.getElementById('kills').innerText = kills;
                if(enemies.length === 0) {
                    level++;
                    document.getElementById('lvl').innerText = level;
                    spawnEnemies();
                }
            }
        }

        function animate() {
            if(!isRunning) return;
            requestAnimationFrame(animate);

            // Movement Logic
            const speed = 0.1;
            if(moveForward) camera.translateZ(-speed);
            if(moveBackward) camera.translateZ(speed);
            if(moveLeft) camera.translateX(-speed);
            if(moveRight) camera.translateX(speed);
            camera.position.y = 1.6; // Keep height steady

            // Enemies follow player
            enemies.forEach(en => {
                en.lookAt(camera.position);
                en.translateZ(0.03 + (level*0.01));
                
                // Damage player if too close
                if(en.position.distanceTo(camera.position) < 1.5) {
                    playerHP -= 0.5;
                    document.getElementById('blood-overlay').style.display = 'block';
                    setTimeout(() => document.getElementById('blood-overlay').style.display = 'none', 100);
                }
            });

            document.getElementById('hp').innerText = Math.max(0, Math.floor(playerHP));

            if(playerHP <= 0) {
                isRunning = false;
                document.getElementById('fail-screen').style.display = 'flex';
                document.exitPointerLock();
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
