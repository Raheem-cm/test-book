<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NYONI-XMD-AI</title>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<style>
:root {
    --blue:#00d2ff;
    --bg:#0a0a0a;
    --chat:#161616;
    --text:#fff;
}
body {
    margin:0;
    font-family:sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    flex-direction:column;
    height:100vh;
}
header {
    text-align:center;
    padding:10px;
    border-bottom:2px solid var(--blue);
    box-shadow:0 0 10px var(--blue);
}
#chat {
    flex:1;
    overflow-y:auto;
    padding:15px;
}
.msg {
    max-width:80%;
    padding:10px;
    border-radius:12px;
    margin:8px 0;
}
.user {
    background:var(--blue);
    color:#000;
    margin-left:auto;
}
.ai {
    background:var(--chat);
    border:1px solid #333;
}
.ai img {
    width:100%;
    border-radius:10px;
}
.input {
    display:flex;
    padding:10px;
    background:#111;
}
input {
    flex:1;
    padding:10px;
    border-radius:20px;
    border:none;
    background:#222;
    color:#fff;
}
button {
    margin-left:8px;
    border:none;
    border-radius:50%;
    width:40px;
    height:40px;
    background:var(--blue);
}
</style>
</head>

<body>

<header>🤖 NYONI-XMD AI</header>

<div id="chat">
<div class="msg ai">Karibu Boss 😎 Uliza chochote...</div>
</div>

<div class="input">
<input id="q" placeholder="Type message..." onkeypress="if(event.key==='Enter')send()">
<button onclick="send()">➤</button>
</div>

<script>
const chat = document.getElementById("chat");

// add message
function add(type,text,img=false){
    let d=document.createElement("div");
    d.className="msg "+type;

    if(img){
        d.innerHTML=`<img src="${text}">`;
    } else {
        d.innerText=text;
    }

    chat.appendChild(d);
    chat.scrollTop=chat.scrollHeight;
}

// AI function (NO FAIL 🔥)
async function askAI(q){

    // 1st API
    try{
        let r=await axios.get("https://api.popcat.xyz/chatbot",{
            params:{
                msg:q,
                owner:"Nyoni",
                botname:"NYONI-XMD"
            }
        });
        return r.data.response;
    }catch(e){}

    // 2nd API fallback
    try{
        let r=await axios.get("https://api.affiliateplus.xyz/api/chatbot",{
            params:{
                message:q,
                botname:"NYONI-XMD",
                ownername:"Nyoni"
            }
        });
        return r.data.message;
    }catch(e){}

    return "⚠️ AI imepata shida kidogo, jaribu tena.";
}

// send message
async function send(){
    let input=document.getElementById("q");
    let q=input.value.trim();
    if(!q) return;

    add("user",q);
    input.value="";

    // image detect
    if(q.toLowerCase().includes("draw") || q.toLowerCase().includes("picha")){
        let img=`https://image.pollinations.ai/prompt/${encodeURIComponent(q)}`;
        add("ai",img,true);
        return;
    }

    add("ai","⏳ Inafikiria...");

    let res=await askAI(q);

    chat.lastChild.remove(); // remove loading
    add("ai",res);
}
</script>

</body>
</html>
