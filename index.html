<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYONI-XMD-TRACKER</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #222;
            padding: 30px;
            border: 2px solid #00ff00;
            box-shadow: 0 0 15px #00ff00;
            border-radius: 10px;
            text-align: center;
            width: 350px;
        }
        input {
            width: 80%;
            padding: 10px;
            margin: 15px 0;
            background: #000;
            border: 1px solid #00ff00;
            color: #00ff00;
            text-align: center;
        }
        button {
            background: #00ff00;
            color: #000;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }
        button:hover {
            background: #00cc00;
        }
        #result {
            margin-top: 20px;
            font-size: 14px;
            color: #fff;
            border-top: 1px solid #444;
            padding-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>NYONI-XMD SCANNER</h2>
    <p>Ingiza namba ya simu kuanza:</p>
    <input type="number" id="phone" placeholder="07XXXXXXXX">
    <br>
    <button onclick="detectDevice()">ANZA UCHUNGUZI</button>

    <div id="result">
        <p style="color: gold;">[ MFUMO UMEKAMILIKA ]</p>
        <p id="phone-display"></p>
        <p id="device-info"></p>
    </div>
</div>

<script>
    function detectDevice() {
        const phone = document.getElementById('phone').value;
        if (phone.length < 10) {
            alert("Tafadhali ingiza namba sahihi!");
            return;
        }

        // Hapa tunasoma taarifa za Browser/Simu
        const userAgent = navigator.userAgent;
        let deviceName = "Unknown Device";

        if (userAgent.match(/Android/i)) deviceName = "Android Smartphone";
        else if (userAgent.match(/iPhone/i)) deviceName = "Apple iPhone";
        else if (userAgent.match(/Windows/i)) deviceName = "Windows PC";
        
        // Kuonyesha matokeo
        document.getElementById('result').style.display = 'block';
        document.getElementById('phone-display').innerText = "Namba: " + phone;
        document.getElementById('device-info').innerText = "Kifaa Kilichogunduliwa: " + deviceName;
        
        console.log("Full System Info: " + userAgent);
    }
</script>

</body>
</html>
