<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NYONI-XMD-WAR | Tanzania Defense Force</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; cursor: crosshair; background: #3b4d21; /* Terrain Green */ }
        
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: #ffd700; text-align: center;
        }

        #ui-panel {
            position: absolute; top: 10px; left: 10px; color: #fff;
            background: rgba(0,0,0,0.6); padding: 15px; border-left: 5px solid #1e592f;
            pointer-events: none; border-radius: 5px;
        }

        .btn-start {
            padding: 20px 50px; font-size: 24px; background: #1e592f; color: gold;
            border: 3px solid gold; cursor: pointer; font-weight: bold; text-transform: uppercase;
        }

        .status-bar { color: #00ff00; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

<div id="ui-panel">
    <div class="status-bar">UNIT: JWTZ SPECIAL FORCES</div>
    <div class="status-bar">MISSION: PROTECT NYONI-XMD-CAMP</div>
    <hr>
    <div>HEALTH: <span id="hp">100%</span></div>
    <div>AMMO: <span id="ammo">30/30</span></div>
    <div>ENEMIES NEUTRALIZED: <span id="score">0</span></div>
</div>

<div id="overlay">
    <h1 style="font-size: 60px; margin-bottom: 10px;">NYONI-XMD-WAR</h1>
    <h3 style="color: white; margin-bottom: 30px;">Tanzania Homeland Defense Mission</h3>
    <button class="btn-start" onclick="initGame()">DEPLOY TO BATTLE</button>
    <p style="color: #ccc; margin-top: 20px;">Use WASD to Move | Mouse to Aim & Shoot</p>
</div>

<canvas id="warCanvas"></canvas>

<script>
    const canvas = document.getElementById('warCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let gameActive = false;
    let score = 0;
    let playerHp = 100;
    let ammo = 30;

    const keys = {};
    const bullets = [];
    const enemies = [];
    
    // JWTZ Soldier Object
    const soldier = {
        x: canvas.width / 2,
        y: canvas.height - 150,
        r: 15,
        speed: 4,
        angle: 0
    };

    // Movement Listeners
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);
    window.addEventListener('mousedown', shoot);
    window.addEventListener('mousemove', e => {
        soldier.angle = Math.atan2(e.clientY - soldier.y, e.clientX - soldier.x);
    });

    function initGame() {
        document.getElementById('overlay').style.display = 'none';
        gameActive = true;
        spawnEnemy();
        draw();
    }

    function shoot() {
        if (ammo > 0 && gameActive) {
            bullets.push({
                x: soldier.x + Math.cos(soldier.angle) * 20,
                y: soldier.y + Math.sin(soldier.angle) * 20,
                vx: Math.cos(soldier.angle) * 10,
                vy: Math.sin(soldier.angle) * 10
            });
            ammo--;
            updateUI();
        }
    }

    function spawnEnemy() {
        if(gameActive) {
            enemies.push({
                x: Math.random() * canvas.width,
                y: -30,
                speed: 1.5 + (score * 0.1)
            });
            setTimeout(spawnEnemy, 1500);
        }
    }

    function updateUI() {
        document.getElementById('hp').innerText = playerHp + "%";
        document.getElementById('ammo').innerText = ammo + "/30";
        document.getElementById('score').innerText = score;
    }

    // Drawing Functions
    function drawCamp() {
        // Main Base (NYONI-XMD-CAMP)
        ctx.fillStyle = "#444";
        ctx.fillRect(canvas.width/2 - 150, 20, 300, 100);
        ctx.strokeStyle = "gold";
        ctx.lineWidth = 4;
        ctx.strokeRect(canvas.width/2 - 150, 20, 300, 100);
        
        ctx.fillStyle = "white";
        ctx.font = "bold 20px Arial";
        ctx.fillText("NYONI-XMD-CAMP", canvas.width/2 - 90, 80);

        // TZ Flag
        ctx.fillStyle = "#1e592f"; ctx.fillRect(canvas.width/2 + 100, 40, 30, 20); // Green
    }

    function drawVehicles() {
        // JWTZ Patrol Truck (Static Decoration)
        ctx.fillStyle = "#2d3e1a"; 
        ctx.fillRect(100, 300, 80, 40); // Body
        ctx.fillStyle = "black"; ctx.fillRect(105, 335, 15, 10); ctx.fillRect(150, 335, 15, 10); // Wheels
        ctx.fillStyle = "white"; ctx.font = "10px Arial"; ctx.fillText("JWTZ-01", 110, 325);

        // Motorcycle (Pikipiki ya Jeshi)
        ctx.strokeStyle = "black"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(canvas.width - 150, 400); ctx.lineTo(canvas.width - 100, 400); ctx.stroke();
        ctx.fillStyle = "#2d3e1a"; ctx.fillRect(canvas.width - 135, 390, 25, 10);
    }

    function draw() {
        if(!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Ground Details
        drawCamp();
        drawVehicles();

        // Update & Draw Soldier (JWTZ Uniform Colors)
        if (keys['KeyW']) soldier.y -= soldier.speed;
        if (keys['KeyS']) soldier.y += soldier.speed;
        if (keys['KeyA']) soldier.x -= soldier.speed;
        if (keys['KeyD']) soldier.x += soldier.speed;

        ctx.save();
        ctx.translate(soldier.x, soldier.y);
        ctx.rotate(soldier.angle);
        // Uniform (Green/Camo)
        ctx.fillStyle = "#354a21"; ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI*2); ctx.fill();
        // Weapon (Gun)
        ctx.fillStyle = "black"; ctx.fillRect(10, -4, 25, 8);
        ctx.restore();

        // Bullets
        bullets.forEach((b, i) => {
            b.x += b.vx; b.y += b.vy;
            ctx.fillStyle = "yellow"; ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
            if(b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
        });

        // Enemies (Invaders)
        enemies.forEach((en, i) => {
            en.y += en.speed;
            ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(en.x, en.y, 15, 0, Math.PI*2); ctx.fill();
            
            // Bullet Collision
            bullets.forEach((b, bi) => {
                let dist = Math.hypot(en.x - b.x, en.y - b.y);
                if(dist < 20) {
                    enemies.splice(i, 1);
                    bullets.splice(bi, 1);
                    score += 10;
                    updateUI();
                }
            });

            // Camp Attack Detection
            if(en.y > 100 && en.y < 120 && en.x > canvas.width/2 - 150 && en.x < canvas.width/2 + 150) {
                gameActive = false;
                alert("GAME OVER! NYONI-XMD-CAMP HAS FALLEN. Final Score: " + score);
                location.reload();
            }
        });

        requestAnimationFrame(draw);
    }
</script>
</body>
</html>
