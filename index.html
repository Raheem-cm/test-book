<script>
let voiceActive = false;
const chatBox = document.getElementById('chat-box');
const loading = document.getElementById('loading');

function toggleVoice() {
    voiceActive = !voiceActive;
    const btn = document.getElementById('vBtn');
    btn.className = voiceActive ? "v-btn v-on" : "v-btn";
    if (!voiceActive) window.speechSynthesis.cancel();
}

function addMsg(type, content, isImg = false) {
    const div = document.createElement('div');
    div.className = `msg ${type}`;

    if (isImg) {
        div.innerHTML = `<img src="${content}">`;
    } else {
        div.innerText = content;
        if (type === 'ai' && voiceActive) speak(content);
    }

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function speak(txt) {
    const s = new SpeechSynthesisUtterance(txt);
    s.lang = 'en-US';
    window.speechSynthesis.speak(s);
}

// 🔥 MAIN AI FUNCTION (WITH FALLBACK)
async function getAIResponse(query) {
    try {
        // API 1 (primary)
        let res = await axios.get(`https://api.giftedtech.my.id/api/ai/gpt4`, {
            params: { apikey: "gifted", q: query },
            timeout: 10000
        });

        if (res.data && res.data.result) {
            return res.data.result;
        }
    } catch (e) {
        console.log("API 1 failed...");
    }

    try {
        // API 2 (fallback 🔥)
        let res2 = await axios.get(`https://api.popcat.xyz/chatbot`, {
            params: {
                msg: query,
                owner: "Nyoni",
                botname: "NYONI-XMD"
            },
            timeout: 10000
        });

        if (res2.data && res2.data.response) {
            return res2.data.response;
        }
    } catch (e) {
        console.log("API 2 failed...");
    }

    return "⚠️ AI imechoka kidogo 😅, jaribu tena baada ya muda.";
}

async function startChat() {
    const input = document.getElementById('query');
    const val = input.value.trim();
    if (!val) return;

    addMsg('user', val);
    input.value = '';
    loading.style.display = 'block';

    try {
        // 🎨 IMAGE GENERATION
        if (
            val.toLowerCase().includes('draw') ||
            val.toLowerCase().includes('picha') ||
            val.toLowerCase().includes('image')
        ) {
            const img = `https://image.pollinations.ai/prompt/${encodeURIComponent(val)}`;
            addMsg('ai', img, true);
        } else {
            const reply = await getAIResponse(val);
            addMsg('ai', reply);
        }
    } catch (err) {
        addMsg('ai', "⚠️ Network error, check internet yako.");
    } finally {
        loading.style.display = 'none';
    }
}
</script>
