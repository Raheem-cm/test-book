<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYONI-XMD-WAR | Tanzania Defense</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; background: linear-gradient(#4a7c44, #2d4c28); }
        
        #ui-layer {
            position: absolute; top: 10px; left: 10px; color: white;
            text-shadow: 2px 2px #000; pointer-events: none;
        }
        .health-bar { width: 200px; height: 20px; border: 2px solid white; background: #333; }
        #health-fill { width: 100%; height: 100%; background: #ff0000; transition: width 0.3s; }
        
        #menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); padding: 30px; border: 3px solid #1e5128;
            color: white; text-align: center; border-radius: 15px;
        }
        button {
            padding: 15px 30px; font-size: 20px; cursor: pointer;
            background: #1e5128; color: white; border: none; border-radius: 5px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <h1>NYONI-XMD-WAR</h1>
        <p>Kamanda: NYONI-XMD</p>
        <div class="health-bar"><div id="health-fill"></div></div>
        <p>Level: <span id="level-num">1</span> | Maadui: <span id="enemy-count">0</span></p>
    </div>

    <div id="menu">
        <img src="https://files.catbox.moe/j7z9sv.jpeg" width="300" style="border-radius: 10px; border: 2px solid gold;">
        <h2>NYONI-XMD: THE LIBERATOR</h2>
        <p>Linda ardhi ya Tanzania dhidi ya wahalifu.</p>
        <button onclick="startGame()">ANZA GAME</button>
        <p><small>W,A,S,D: Move | SPACE: Shoot | F: Melee</small></p>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<audio id="bgMusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const healthFill = document.getElementById('health-fill');
    const menu = document.getElementById('menu');
    const bgMusic = document.getElementById('bgMusic');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let gameRunning = false;
    let level = 1;
    
    // Picha ya Kamanda
    const heroImg = new Image();
    heroImg.src = 'https://files.catbox.moe/j7z9sv.jpeg';

    const player = {
        x: 100, y: 300, w: 60, h: 90,
        speed: 5, health: 100,
        bullets: [],
        color: '#1e5128' // Rangi ya jeshi la Tanzania
    };

    let enemies = [];
    const keys = {};

    function spawnEnemies() {
        enemies = [];
        for(let i=0; i < level * 3; i++) {
            enemies.push({
                x: canvas.width + Math.random() * 500,
                y: Math.random() * (canvas.height - 100),
                w: 50, h: 80,
                speed: 2 + Math.random() * 2,
                health: 50
            });
        }
        document.getElementById('enemy-count').innerText = enemies.length;
    }

    function startGame() {
        menu.style.display = 'none';
        gameRunning = true;
        player.health = 100;
        level = 1;
        spawnEnemies();
        bgMusic.play(); // Wimbo wa Tanzania utaanza
        animate();
    }

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);
    
    // Risasi na Ngumi
    window.addEventListener('keydown', e => {
        if(e.code === 'Space' && gameRunning) {
            player.bullets.push({x: player.x + 50, y: player.y + 30, speed: 10});
        }
        if(e.code === 'KeyF' && gameRunning) {
            checkMelee();
        }
    });

    function checkMelee() {
        enemies.forEach((enemy, index) => {
            let dist = Math.hypot(player.x - enemy.x, player.y - enemy.y);
            if(dist < 80) {
                enemy.health -= 30; // Ngumi ina nguvu karibu
                if(enemy.health <= 0) enemies.splice(index, 1);
            }
        });
    }

    function update() {
        if(keys['KeyW'] && player.y > 0) player.y -= player.speed;
        if(keys['KeyS'] && player.y < canvas.height - player.h) player.y += player.speed;
        if(keys['KeyA'] && player.x > 0) player.x -= player.speed;
        if(keys['KeyD'] && player.x < canvas.width/2) player.x += player.speed;

        // Update Bullets
        player.bullets.forEach((b, i) => {
            b.x += b.speed;
            if(b.x > canvas.width) player.bullets.splice(i, 1);
            
            enemies.forEach((en, ei) => {
                if(b.x > en.x && b.x < en.x + en.w && b.y > en.y && b.y < en.y + en.h) {
                    en.health -= 25;
                    player.bullets.splice(i, 1);
                    if(en.health <= 0) enemies.splice(ei, 1);
                }
            });
        });

        // Update Enemies
        enemies.forEach((en, i) => {
            en.x -= en.speed;
            if(en.x < player.x + player.w && en.x + en.w > player.x && en.y < player.y + player.h && en.y + en.h > player.y) {
                player.health -= 0.5;
            }
            if(en.x < -50) en.x = canvas.width + 100;
        });

        healthFill.style.width = player.health + '%';
        document.getElementById('enemy-count').innerText = enemies.length;

        if(player.health <= 0) {
            gameRunning = false;
            alert("GAME OVER! Kamanda NYONI-XMD Ameuawa. Jaribu Tena.");
            location.reload();
        }

        if(enemies.length === 0) {
            level++;
            document.getElementById('level-num').innerText = level;
            spawnEnemies();
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Player (Kamanda NYONI-XMD)
        ctx.drawImage(heroImg, player.x, player.y, player.w, player.h);
        
        // Draw Bullets
        ctx.fillStyle = 'yellow';
        player.bullets.forEach(b => ctx.fillRect(b.x, b.y, 10, 4));

        // Draw Enemies
        ctx.fillStyle = 'red';
        enemies.forEach(en => {
            ctx.fillRect(en.x, en.y, en.w, en.h);
            ctx.fillStyle = 'white';
            ctx.fillText("ADUI", en.x, en.y - 5);
            ctx.fillStyle = 'red';
        });

        // Background vibes (Miti/Nyika)
        ctx.fillStyle = 'rgba(255,255,255,0.1)';
        ctx.fillText("TANZANIA BORDER - MISSION XMD", canvas.width/2 - 100, 50);
    }

    function animate() {
        if(!gameRunning) return;
        update();
        draw();
        requestAnimationFrame(animate);
    }
</script>

</body>
</html>
